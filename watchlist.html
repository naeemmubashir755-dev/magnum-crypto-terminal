<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist | Crypto Terminal</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/app.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/utils.js" defer></script>
  </head>
  <body>
    <header>
      <nav aria-label="Primary navigation">
        <ul>
          <li><a href="index.html">Dashboard</a></li>
          <li><a href="markets.html">Markets</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="watchlist.html" aria-current="page">Watchlist</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
        <button type="button" id="theme-toggle" class="btn-secondary">Dark mode</button>
      </nav>
    </header>

    <aside aria-label="Sidebar navigation">
      <nav>
        <ul>
          <li><a href="index.html"><span aria-hidden="true">⌂</span> Dashboard</a></li>
          <li><a href="markets.html"><span aria-hidden="true">📈</span> Markets</a></li>
          <li><a href="portfolio.html"><span aria-hidden="true">💼</span> Portfolio</a></li>
          <li><a href="watchlist.html" aria-current="page"><span aria-hidden="true">⭐</span> Watchlist</a></li>
          <li><a href="login.html"><span aria-hidden="true">🔐</span> Login</a></li>
          <li><a href="register.html"><span aria-hidden="true">📝</span> Register</a></li>
        </ul>
      </nav>
    </aside>

    <main>
      <section aria-labelledby="watchlist-title">
        <h1 id="watchlist-title">Watchlist</h1>
        <p>Monitor your favorite cryptocurrencies and track their latest movements.</p>
      </section>

      <section aria-labelledby="watchlist-form-title">
        <h2 id="watchlist-form-title">Add Coin</h2>
        <form id="watchlist-form">
          <div>
            <label for="coin-name">Coin name</label>
            <input id="coin-name" name="coin-name" type="text" placeholder="e.g. Bitcoin" />
          </div>
          <button type="submit" class="btn-primary">Add to Watchlist</button>
        </form>
      </section>

      <section aria-labelledby="watchlist-search-title">
        <h2 id="watchlist-search-title">Search Coins</h2>
        <label for="watchlist-search">Search your watchlist</label>
        <input id="watchlist-search" name="watchlist-search" type="search" placeholder="Search by coin name" />
      </section>

      <section aria-labelledby="watchlist-list-title">
        <h2 id="watchlist-list-title">Your Watchlist</h2>
        <ul id="watchlist-list" class="watchlist-list"></ul>
      </section>
    </main>

    <script src="js/watchlist.js" defer></script>
  </body>
</html>
